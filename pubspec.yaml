name: qent
description: "Qent - P2P Car Rental Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  # Firebase (kept for chat feature - will migrate later)
  firebase_core: ^4.2.0
  firebase_auth: ^6.1.1
  cloud_firestore: ^6.0.3
  firebase_storage: ^13.0.3
  firebase_messaging: ^16.0.3
  # UI
  smooth_page_indicator: ^1.2.1
  lottie: ^3.3.2
  flutter_screenutil: ^5.9.3
  flutter_vector_icons: ^2.0.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  im_stepper: ^1.0.1+1
  # State management
  flutter_riverpod: ^3.0.3
  # Networking
  http: ^1.2.2
  web_socket_channel: ^3.0.2
  # Voice/Video Calls
  flutter_webrtc: ^0.12.12+hotfix.1
  permission_handler: ^11.3.1
  # Voice notes
  record: 4.4.4
  audioplayers: ^6.1.0
  path_provider: ^2.1.5
  # File upload
  http_parser: ^4.1.1
  # Storage
  shared_preferences: ^2.3.4
  # Location
  geolocator: ^13.0.1
  geocoding: ^3.0.0
  # Routing
  go_router: ^16.3.0
  # Utilities
  intl: ^0.19.0
  flutter_local_notifications: ^18.0.1
  image_picker: ^1.1.2
  flutter_dotenv: ^5.1.0
  crypto: ^3.0.5
  flutter_svg: ^2.0.17
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/qent-logo-pack/png/icon/qent-icon-1024x1024.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/qent-logo-pack/png/icon-light/qent-icon-light-1024x1024.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/navbar/
    - assets/images/carFeatures/
    - assets/images/Profile/
    - assets/images/card_brands/
    - .env
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/inter-Bold.ttf
          weight: 700
